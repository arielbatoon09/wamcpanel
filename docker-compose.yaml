name: wamcpanel

services:
  # Relational Database (PostgreSQL)
  pg:
    image: postgres:17-alpine
    restart: always
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - pg-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-wamc_db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          memory: 256M

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 128M

  # Backend Web Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        DATABASE_URL: "postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@pg:5432/${DB_NAME:-wamc_db}?schema=public"

    restart: always

    ports:
      - "${BACKEND_PORT:-8000}:8000"
      - "${SFTP_PORT:-2022}:2022"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./servers:/servers
      - ./backups:/backups
      - ./changelogs.json:/app/changelogs.json:ro
      - ./version.json:/app/version.json:ro
      - ./backend/sftp_host_key:/app/sftp_host_key

    environment:
      DATABASE_URL: "postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@pg:5432/${DB_NAME:-wamc_db}?schema=public"
      REDIS_URL: redis://redis:6379
      NODE_ENV: ${NODE_ENV:-production}
      STAGE: ${STAGE:-dev}
      PORT: 8000
      JWT_SECRET: ${JWT_SECRET:-some_jwt_secret_key_here}
      SFTP_PORT: ${SFTP_PORT:-2022}
      HOST_SERVERS_DIR: ${HOST_SERVERS_DIR:-/opt/wamcpanel/servers}

    depends_on:
      pg:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Frontend Web Service (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - '${FRONTEND_PORT:-3000}:3000'
    environment:
      - NODE_ENV=${NODE_ENV:-production}
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          memory: 256M

volumes:
  pg-data:
    name: wamcpanel-pg-data
  redis-data:
    name: wamcpanel-redis-data